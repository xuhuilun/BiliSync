services:
  server:
    image: ghcr.io/sky1wu/bili-syncplay-server:latest
    build: .
    restart: unless-stopped
    ports:
      - "8787:8787"
    environment:
      # Web clients send the page Origin during the WebSocket handshake.
      # Replace this with your production HTTPS origin, for example:
      # ALLOWED_ORIGINS: "https://watch.example.com"
      ALLOWED_ORIGINS: "http://localhost:8787"

      # Enable Redis for restart-safe rooms and multi-node deployment.
      # ROOM_STORE_PROVIDER: "redis"
      # RUNTIME_STORE_PROVIDER: "redis"
      # ROOM_EVENT_BUS_PROVIDER: "redis"
      # ADMIN_COMMAND_BUS_PROVIDER: "redis"
      # REDIS_URL: "redis://redis:6379"

      # Optional admin panel.
      # ADMIN_USERNAME: "admin"
      # ADMIN_PASSWORD_HASH: "sha256:<hex-password-hash>"
      # ADMIN_SESSION_SECRET: "<random-secret>"

  # redis:
  #   image: redis:7-alpine
