name: Release Extension

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build release package
        # build:release builds chrome + firefox sequentially and emits
        # release/*-chrome.zip, release/*-firefox.zip, release/*-firefox.xpi.
        run: npm run build:release
        env:
          BILI_SYNCPLAY_EXTENSION_KEY: ${{ secrets.BILI_SYNCPLAY_EXTENSION_KEY }}
          BILI_SYNCPLAY_DEFAULT_SERVER_URL: ${{ vars.BILI_SYNCPLAY_DEFAULT_SERVER_URL }}

      - name: Lint Firefox build (non-blocking)
        # Soft gate: dist-firefox has 0 errors but expected warnings
        # (data_collection_permissions KEY_FIREFOX_*_UNSUPPORTED_BY_MIN_VERSION
        # because the key is only read by Firefox >=140 while strict_min_version
        # is 121). Do not fail the release on warnings.
        continue-on-error: true
        run: npx --yes web-ext lint --source-dir extension/dist-firefox --output text --no-config-discovery

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.zip
            release/*.xpi
          generate_release_notes: true
