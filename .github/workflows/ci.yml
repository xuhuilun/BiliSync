name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"

      - name: Install dependencies
        run: npm ci

      - name: Run dependency audit gate
        run: npm run audit

      - name: Run audit gate tests
        run: npm run test:audit-gate

      - name: Run lint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Run typecheck
        run: npm run typecheck

      - name: Build workspaces
        run: npm run build

      - name: Run tests with coverage
        run: npm run coverage

      - name: Build Firefox extension target
        run: npm run build:extension:firefox

  redis-integration:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"

      - name: Install dependencies
        run: npm ci

      - name: Build protocol package
        run: npm run build -w @bili-syncplay/protocol

      - name: Run server tests against Redis
        run: npm run test:server:redis
        env:
          REDIS_URL: redis://127.0.0.1:6379

  benchmark-baseline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"

      - name: Install dependencies
        run: npm ci

      - name: Run lightweight benchmark baseline
        run: npm run bench:ci-light -- --output-dir .tmp/bench-ci

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-benchmark-results
          path: .tmp/bench-ci
          if-no-files-found: error
