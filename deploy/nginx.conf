# ─────────────────────────────────────────────
# Bili-SyncPlay Nginx Configuration
# ─────────────────────────────────────────────
# 1. Copy to /etc/nginx/sites-available/bilisync
# 2. ln -s /etc/nginx/sites-available/bilisync /etc/nginx/sites-enabled/
# 3. Replace YOUR_DOMAIN with your actual domain
# 4. Obtain SSL certs: certbot --nginx -d YOUR_DOMAIN
# ─────────────────────────────────────────────

# WebSocket upgrade header mapping
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      '';
}

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN;

    # Let's Encrypt certificate renewal (ACME challenge)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    return 301 https://$host$request_uri;
}

# HTTPS server
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name YOUR_DOMAIN;

    # ── SSL certificates (Let's Encrypt) ──
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Security headers ──
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    # ── Web panel static files ──
    root /opt/bilisync/web/dist;
    index index.html;

    # ── Gzip ──
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        application/xml+rss
        image/svg+xml;

    # ── Vite static assets (content-hashed filenames → immutable cache) ──
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # ── Favicon & static files at root ──
    location ~* \.(ico|png|jpg|jpeg|gif|svg|webp|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        try_files $uri =404;
    }

    # ── HTML files (never cache) ──
    location ~* \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ── Health check endpoints → Node (no access log) ──
    location = /healthz {
        proxy_pass http://127.0.0.1:8787;
        access_log off;
    }
    location = /readyz {
        proxy_pass http://127.0.0.1:8787;
        access_log off;
    }
    location = /metrics {
        proxy_pass http://127.0.0.1:8787;
        access_log off;
    }

    # Bilibili media proxy fallback: stream immediately without buffering the
    # long response to memory or a temporary file. Normal playback is direct
    # from the browser to Bilibili CDN; this path is only the compatibility
    # fallback.
    location ^~ /api/web/media/ {
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── API routes → Node ──
    location /api/ {
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Admin panel → Node (needs runtime config injection) ──
    location /admin {
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Root: static files + WebSocket upgrade proxy ──
    # WebSocket connects to wss://YOUR_DOMAIN (root path, no /ws prefix).
    # Non-upgrade requests serve the SPA; upgrade requests go to Node.
    location / {
        # WebSocket upgrade → Node server
        if ($http_upgrade != "") {
            proxy_pass http://127.0.0.1:8787;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # Regular HTTP → static files with SPA fallback
        try_files $uri $uri/ /index.html;
    }

    # ── Client body size (for API requests) ──
    client_max_body_size 10m;
}
